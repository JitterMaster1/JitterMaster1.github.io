<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitterMaster | Performance Redefined</title>
    <!-- Google Fonts: Inter を使用 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
    <!-- アイコン用: Lucide Iconsを使用 -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- ヘッダー / ナビゲーション -->
    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="JitterMaster Logo" class="logo-img">
            <span class="logo-text">JitterMaster</span>
        </div>
        
        <!-- ナビゲーションリンク（削除しました） -->

        <div class="nav-icons">
            <!-- YouTube アイコン -->
            <a href="#" target="_blank" aria-label="YouTube"><i data-lucide="youtube"></i></a>
            <!-- X (Twitter) アイコン -->
            <a href="#" target="_blank" aria-label="X"><i data-lucide="twitter"></i></a>
            <!-- Discord アイコン (Lucideにないため、SVGで直接記述) -->
            <a href="#" target="_blank" aria-label="Discord">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-discord">
                    <path d="M18.63 4.11a17.13 17.13 0 0 0-4.22-1.31.06.06 0 0 0-.06.03 11.9 11.9 0 0 0-.53 1.1.06.06 0 0 1-.1.03 15.65 15.65 0 0 0-3.44 0 .06.06 0 0 1-.1-.03 12.56 12.56 0 0 0-.54-1.1.06.06 0 0 0-.06-.03 17.16 17.16 0 0 0-4.22 1.31.05.05 0 0 0-.03.02 17.6 17.6 0 0 0-3.3 8.3.06.06 0 0 0 .02.04 17.43 17.43 0 0 0 5.19 2.62.06.06 0 0 0 .07-.02c.4-.55.75-1.13 1.05-1.74a.06.06 0 0 0-.03-.08 11.57 11.57 0 0 1-1.62-.77.06.06 0 0 1 0-.1c.14-.1.27-.21.4-.32a.06.06 0 0 1 .06-.01 11.23 11.23 0 0 0 9.8 0 .06.06 0 0 1 .06.01c.13.11.26.22.4.32a.06.06 0 0 1 0 .1 11.75 11.75 0 0 1-1.62.77.06.06 0 0 0-.03.08c.3.61.65 1.19 1.05 1.74a.06.06 0 0 0 .07.02 17.41 17.41 0 0 0 5.19-2.62.06.06 0 0 0 .02-.04 17.65 17.65 0 0 0-3.3-8.3.05.05 0 0 0-.03-.02ZM8.67 12.87c-1.02 0-1.85-.94-1.85-2.09S7.65 8.7 8.67 8.7s1.85.94 1.85 2.09-.83 2.08-1.85 2.08Zm6.66 0c-1.02 0-1.85-.94-1.85-2.09S14.31 8.7 15.33 8.7s1.85.94 1.85 2.09-.83 2.08-1.85 2.08Z"/>
                </svg>
            </a>
        </div>
    </header>

    <!-- ヒーローセクション -->
    <main class="hero">
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1>Performance <br><span class="highlight">Redefined.</span></h1>
            <p class="description">
                Unlock the impossible. Engineered to transform any standard keyboard into a high-performance analog engine with 8000Hz precision and 0.13ms response fidelity.
            </p>
            
            <div class="cta-buttons">
                <button class="btn-primary">Shop Now <i data-lucide="arrow-right"></i></button>
                <button class="btn-secondary">View Documentation</button>
            </div>

            <div class="features">
                <div class="feature-item">
                    <i data-lucide="zap"></i>
                    <span>0.1ms Response</span>
                </div>
                <div class="feature-item">
                    <i data-lucide="shield-check"></i>
                    <span>Secure & Safe</span>
                </div>
                <div class="feature-item">
                    <i data-lucide="clock"></i>
                    <span>Instant Delivery</span>
                </div>
            </div>
        </div>
        
        <!-- スクロールインジケーター（削除しました） -->
    </main>

    <script>
        // Lucideアイコンを有効化
        lucide.createIcons();
    </script>
</body>
</html>
