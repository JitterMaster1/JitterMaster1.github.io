<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitterMaster | Apex Legends Movement Macro</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- CSSファイルの読み込み (バージョン更新) -->
    <link rel="stylesheet" href="style.css?v=1.4">
    <!-- アイコン用: Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- ヘッダー / ナビゲーション -->
    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="JitterMaster Logo" class="logo-img">
            <span class="logo-text">JitterMaster</span>
        </div>
        
        <div class="nav-icons">
            <!-- YouTube -->
            <a href="#" target="_blank" aria-label="YouTube">
                <img src="YouTubelogo.png" alt="YouTube" class="nav-social-img">
            </a>
            <!-- X (Twitter) -->
            <a href="#" target="_blank" aria-label="X">
                <img src="Xlogo.png" alt="X" class="nav-social-img icon-x">
            </a>
            <!-- Discord -->
            <a href="#" target="_blank" aria-label="Discord">
                <img src="Discordlogo.png" alt="Discord" class="nav-social-img">
            </a>
        </div>
    </header>

    <!-- ヒーローセクション -->
    <main class="hero">
        <div class="hero-overlay"></div>
        
        <div class="hero-container">
            <!-- 左側：画像セクション -->
            <div class="hero-image-box">
                <img src="software.png" alt="Apex Legends Movement Macro Preview" class="software-img">
            </div>

            <!-- 右側：コンテンツセクション -->
            <div class="hero-content">
                <h1>Apex Legends <br><span class="highlight">Movement Macro</span></h1>
                <p class="description">
                    Automates strafing in Apex Legends. Simply hold the Space key and press a movement key. Available for purchase below.
                </p>
                <div class="cta-buttons">
                    <button class="btn-primary">Buy Now <i data-lucide="shopping-cart"></i></button>
                    <button class="btn-secondary">View Documentation</button>
                </div>
                <div class="features">
                    <div class="feature-item">
                        <i data-lucide="clock"></i>
                        <span>5ms Intervals</span>
                    </div>
                    <div class="feature-item">
                        <i data-lucide="shield-check"></i>
                        <span>Undetected</span>
                    </div>
                    <div class="feature-item">
                        <i data-lucide="infinity"></i>
                        <span>Lifetime</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
