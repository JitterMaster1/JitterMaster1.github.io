<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitterMaster | Apex Legends Movement Macro</title>
    <!-- サイトのアイコン (favicon) の設定 -->
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- CSSファイルの読み込み (バージョンを3.1に更新) -->
    <link rel="stylesheet" href="style.css?v=3.1">
    <!-- アイコン用: Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- ヘッダー / ナビゲーション -->
    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="JitterMaster Logo" class="logo-img">
            <span class="logo-text">JitterMaster</span>
        </div>
        
        <div class="nav-icons">
            <!-- YouTube -->
            <a href="#" target="_blank" aria-label="YouTube">
                <img src="YouTubelogo.png" alt="YouTube" class="nav-social-img">
            </a>
            <!-- X (Twitter) -->
            <a href="#" target="_blank" aria-label="X">
                <img src="Xlogo.png" alt="X" class="nav-social-img icon-x">
            </a>
            <!-- Discord -->
            <a href="#" target="_blank" aria-label="Discord">
                <img src="Discordlogo.png" alt="Discord" class="nav-social-img">
            </a>
        </div>
    </header>

    <!-- ヒーローセクション -->
    <main class="hero">
        <div class="hero-overlay"></div>
        
        <div class="hero-container">
            <!-- 左側：画像セクション -->
            <div class="hero-image-box">
                <img src="software.png" alt="Apex Legends Movement Macro Preview" class="software-img">
            </div>

            <!-- 右側：コンテンツセクション -->
            <div class="hero-content">
                <h1>Apex Legends <br><span class="highlight">Movement Macro</span></h1>
                <p class="description">
                    Automates strafing in Apex Legends. Simply hold the Space key and press a movement key. Available for purchase below.
                </p>
                
                <!-- ボタンエリア (CTA Group) -->
                <div class="cta-group">
                    <div class="cta-top-row">
                        <button id="buy-now-btn" class="btn-primary">Buy Now <i data-lucide="shopping-cart"></i></button>
                        <button id="check-key-btn" class="btn-secondary">Check License Key <i data-lucide="key"></i></button>
                    </div>
                    <button class="btn-wide">Learn More</button>
                </div>

                <!-- 特徴セクション -->
                <div class="features">
                    <div class="feature-item">
                        <i data-lucide="gamepad-2"></i>
                        <span>Controller Support</span>
                    </div>
                    <div class="feature-item">
                        <i data-lucide="shield-check"></i>
                        <span>Undetected</span>
                    </div>
                    <div class="feature-item">
                        <i data-lucide="infinity"></i>
                        <span>Lifetime</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ログイン状態表示 (画面右下) -->
    <footer id="footer-status" class="login-status-footer" style="display: none;">
        Signed in to Discord as <span id="discord-username-display"></span>. 
        <a href="#" id="switch-account-link" class="switch-link">Switch account</a>
    </footer>

    <script>
        lucide.createIcons();

        // サーバーのURL (Cloudflare TunnelのURL)
        const API_BASE_URL = 'https://tire-organizations-instructions-travelling.trycloudflare.com';

        /**
         * ログイン状態の確認
         */
        async function checkLoginStatus() {
            try {
                // セッション維持のためcredentialsを含める
                const response = await fetch(`${API_BASE_URL}/user/status`);
                if (response.ok) {
                    const user = await response.json();
                    if (user && user.username) {
                        document.getElementById('discord-username-display').innerText = user.username;
                        document.getElementById('footer-status').style.display = 'block';
                    }
                }
            } catch (error) {
                console.log('Not logged in or server down');
            }
        }

        /**
         * 認証・アクション開始
         * @param {string} action - 'buy' or 'check'
         * @param {boolean} isSwitch - アカウント切り替えかどうか
         */
        function handleAction(action, isSwitch = false) {
            let url = `${API_BASE_URL}/auth/discord?action=${action}`;
            if (isSwitch) {
                url += '&switch=true';
            }
            window.location.href = url;
        }

        // イベントリスナーの登録
        document.getElementById('buy-now-btn').addEventListener('click', () => handleAction('buy'));
        document.getElementById('check-key-btn').addEventListener('click', () => handleAction('check'));
        
        // Switch account ボタン
        document.getElementById('switch-account-link').addEventListener('click', (e) => {
            e.preventDefault();
            handleAction('buy', true);
        });

        // ページ読み込み時にログイン状態を確認
        window.addEventListener('DOMContentLoaded', checkLoginStatus);
    </script>
</body>
</html>
