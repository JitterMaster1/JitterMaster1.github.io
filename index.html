<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitterMaster | Performance Redefined</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
    <!-- アイコン用: Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- ヘッダー / ナビゲーション -->
    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="JitterMaster Logo" class="logo-img">
            <span class="logo-text">JitterMaster</span>
        </div>
        
        <div class="nav-icons">
            <!-- YouTube -->
            <a href="#" target="_blank" class="social-link">
                <img src="YouTubelogo.png" alt="YouTube" class="nav-social-img">
            </a>
            <!-- X (Twitter) -->
            <a href="#" target="_blank" class="social-link">
                <img src="Xlogo.png" alt="X" class="nav-social-img">
            </a>
            <!-- Discord -->
            <a href="#" target="_blank" class="social-link">
                <img src="Discordlogo.png" alt="Discord" class="nav-social-img">
            </a>
        </div>
    </header>

    <!-- ヒーローセクション -->
    <main class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Performance <br><span class="highlight">Redefined.</span></h1>
            <p class="description">
                Unlock the impossible. Engineered to transform any standard keyboard into a high-performance analog engine with 8000Hz precision and 0.13ms response fidelity.
            </p>
            <div class="cta-buttons">
                <button class="btn-primary">Shop Now <i data-lucide="arrow-right"></i></button>
                <button class="btn-secondary">View Documentation</button>
            </div>
            <div class="features">
                <div class="feature-item">
                    <i data-lucide="zap"></i>
                    <span>0.1ms Response</span>
                </div>
                <div class="feature-item">
                    <i data-lucide="shield-check"></i>
                    <span>Secure & Safe</span>
                </div>
                <div class="feature-item">
                    <i data-lucide="clock"></i>
                    <span>Instant Delivery</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
